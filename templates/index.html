<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --line: rgba(240,236,228,0.1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.35;
    }

    /* ── Spotlight ── */
    .spotlight {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
      50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    }

    /* ── Horizontal lines ── */
    .lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .lines span {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: var(--line);
    }
    .lines span:nth-child(1) { top: 20%; }
    .lines span:nth-child(2) { top: 50%; }
    .lines span:nth-child(3) { top: 80%; }

    /* vertical lines */
    .lines::before, .lines::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--line);
    }
    .lines::before { left: 12%; }
    .lines::after  { right: 12%; }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1s 1.2s ease forwards;
    }
    .corner svg { width: 100%; height: 100%; stroke: var(--gold); stroke-width: 1; fill: none; }
    .corner.tl { top: 32px; left: 32px; }
    .corner.tr { top: 32px; right: 32px; transform: scaleX(-1); }
    .corner.bl { bottom: 32px; left: 32px; transform: scaleY(-1); }
    .corner.br { bottom: 32px; right: 32px; transform: scale(-1); }

    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 40px 80px;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: slideDown 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes slideDown {
      from { opacity:0; transform: translateY(-12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    .nav {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav a {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav a:hover { color: var(--text); }

    /* ── Hero center ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeIn 0.6s 0.5s ease forwards;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -1px;
      margin-bottom: 0;
    }

    .line-wrap {
      overflow: hidden;
      display: block;
    }

    .line-inner {
      display: block;
      opacity: 0;
      transform: translateY(100%);
      animation: lineUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .line-inner.l1 { animation-delay: 0.55s; color: var(--text); }
    .line-inner.l2 {
      animation-delay: 0.70s;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: italic;
    }
    .line-inner.l3 { animation-delay: 0.85s; color: var(--text); }

    @keyframes lineUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      margin-top: 32px;
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.7;
      max-width: 380px;
      opacity: 0;
      animation: fadeIn 0.7s 1.1s ease forwards;
    }

    /* ── CTA ── */
    .cta-wrap {
      margin-top: 48px;
      display: flex;
      gap: 16px;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.7s 1.3s ease forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      border: none;
      border-radius: 4px;
      padding: 14px 32px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 24px rgba(201,168,76,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,168,76,0.45);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 24px;
      border: 1px solid var(--line);
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(240,236,228,0.25); }

    /* ── Bottom bar ── */
    .bottombar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: slideUp 0.7s 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
      50%      { opacity:0.7; box-shadow: 0 0 0 5px rgba(74,222,128,0); }
    }

    .scroll-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollAnim 2s ease-in-out infinite;
    }
    @keyframes scrollAnim {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 0; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      100% { transform: scaleY(1); transform-origin: bottom; opacity: 0; }
    }

    .build-info {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
    }
    .build-info span { color: var(--gold); }

    @media (max-width: 600px) {
      .page { padding: 28px 24px; }
      .nav  { display: none; }
      .corner { display: none; }
      .bottombar { flex-direction: column; align-items: center; gap: 20px; }
    }
  </style>
</head>
<body>

  <div class="spotlight"></div>
  <div class="lines">
    <span></span><span></span><span></span>
  </div>

  <!-- Corner brackets -->
  <div class="corner tl">
    <svg viewBox="0 0 60 60"><polyline points="60,0 0,0 0,60"/></svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 60 60"><polyline points="60,0 0,0 0,60"/></svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 60 60"><polyline points="60,0 0,0 0,60"/></svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 60 60"><polyline points="60,0 0,0 0,60"/></svg>
  </div>

  <div class="page">

    <!-- Top bar -->
    <header class="topbar">
      <div class="logo">SEPI</div>
      <ul class="nav">
        <li><a href="#">Home</a></li>
        <li><a href="/predictdata">Predict</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </header>

    <!-- Hero -->
    <main class="hero">
      <div class="eyebrow">Machine Learning · Flask</div>

      <h1>
        <span class="line-wrap"><span class="line-inner l1">Welcome</span></span>
        <span class="line-wrap"><span class="line-inner l2">Home</span></span>
        <span class="line-wrap"><span class="line-inner l3">Page</span></span>
      </h1>

      <p class="tagline">
        An intelligent system that predicts student mathematics performance
        using academic and demographic data.
      </p>

      <div class="cta-wrap">
        <a href="/predictdata" class="btn-primary">
          Start Predicting →
        </a>
        <a href="#" class="btn-ghost">Learn More</a>
      </div>
    </main>

    <!-- Bottom bar -->
    <footer class="bottombar">
      <div class="status">
        <div class="status-dot"></div>
        Model Active
      </div>
      <div class="scroll-hint">
        <div class="scroll-line"></div>
        Scroll
      </div>
      <div class="build-info">
        Built with <span>Python & Flask</span><br/>ML Powered
      </div>
    </footer>

  </div>

</body>
</html>
